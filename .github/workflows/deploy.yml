name: 部署到 page 分支

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  TZ: Asia/Shanghai
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出源码
        uses: actions/checkout@v5
        with:
          ref: main

      - name: 设置 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - name: 缓存项目依赖
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-nodeModules-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-nodeModules-

      - name: 安装依赖
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: 内容检查
        run: pnpm content:check

      - name: 类型检查
        run: pnpm types:check

      - name: 代码检查
        run: pnpm lint

      - name: 构建站点
        run: pnpm build

      - name: 部署到 page 分支
        run: |
          cd out
          git init
          git checkout -b page
          git config user.name 'GitHub Action'
          git config user.email 'action@github.com'
          git add .
          git commit -m "🤓$(date +"%Z %Y-%m-%d %A %H:%M:%S")"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force --quiet origin page
